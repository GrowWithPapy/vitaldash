  <script type="application/ld+json">
  {"@context":"https://schema.org","@type":"FAQPage","mainEntity":[{"@type":"Question","name":"How much protein do I need per day?","acceptedAnswer":{"@type":"Answer","text":"For sedentary adults the requirement is 0.8 to 1.0 grams per kilogram of bodyweight. Active adults benefit from 1.2 to 1.6 g/kg. Strength athletes building muscle need 1.6 to 2.2 g/kg, and that rises to 2.0 to 2.6 g/kg during a calorie deficit. The exact number depends on your weight, training, and goal."}},{"@type":"Question","name":"Is 1g of protein per pound of bodyweight necessary?","acceptedAnswer":{"@type":"Answer","text":"No. The popular '1 gram per pound' rule (about 2.2 g/kg) sits at the upper end of the evidence-based range and is unnecessary for most lifters. Studies show diminishing returns above 1.6 g/kg in trained adults, and above 2.2 g/kg there is no proven additional benefit. The rule is a safe overshoot, not a requirement."}},{"@type":"Question","name":"How much protein should I eat to lose fat without losing muscle?","acceptedAnswer":{"@type":"Answer","text":"During a calorie deficit, aim for 2.0 to 2.6 grams per kilogram of bodyweight. The lower end works for sedentary cuts; the higher end protects muscle when lifting weights. This range is significantly higher than maintenance protein needs and is supported by ISSN 2017 and meta-analyses by Helms et al."}},{"@type":"Question","name":"Can you eat too much protein?","acceptedAnswer":{"@type":"Answer","text":"Above roughly 3.5 g/kg of bodyweight, additional protein provides no further benefit and slightly increases kidney workload (in healthy people). Most people overestimate how much protein they actually eat. Tracking with a food scale and a label-reading app closes the gap."}},{"@type":"Question","name":"What's the best source of protein?","acceptedAnswer":{"@type":"Answer","text":"There is no single best source. Animal proteins (chicken, beef, fish, eggs, dairy) have a complete amino acid profile and high digestibility. Plant proteins (legumes, tofu, tempeh, seitan) work fine when combined for complete amino acids and eaten in slightly larger amounts. Variety beats any one food."}},{"@type":"Question","name":"Should I eat protein before or after a workout?","acceptedAnswer":{"@type":"Answer","text":"Total daily protein matters far more than precise timing. The 'anabolic window' is wider than once thought, roughly 4 to 6 hours around a workout. As long as you hit your daily target spread across 3 to 5 meals, exact pre or post timing has only a small additional effect."}},{"@type":"Question","name":"Do older adults need more protein?","acceptedAnswer":{"@type":"Answer","text":"Yes. Adults over 50 experience anabolic resistance, meaning the same protein dose triggers less muscle protein synthesis than in younger adults. Recommended intake rises by about 0.2 g/kg of bodyweight, and per-meal doses of 0.4 g/kg become important to overcome the resistance."}},{"@type":"Question","name":"How is protein need different for vegans and vegetarians?","acceptedAnswer":{"@type":"Answer","text":"Plant proteins are typically lower in leucine and have slightly reduced digestibility. Vegans and vegetarians should aim for the higher end of their range and combine sources across the day (legumes plus grains, soy, seitan). Adding 10 to 20% to the calculated target is a reasonable adjustment."}}]}
  </script>
